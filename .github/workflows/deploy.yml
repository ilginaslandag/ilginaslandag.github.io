name: Haberleri çek ve yayınla

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/30 * * * *" # her 30 dakikada bir taze haber
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Haberleri çek (news.json üret)
        run: node scripts/fetch-news.js
      - name: Telefona bildirim gönder (yeni haber özeti)
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: node scripts/notify.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
